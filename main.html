<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
      <!-- Your code here -->
      <table border="1" width="100%">

    <tr>
        <td>

            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 1</th>
                </tr>
                <tr>
                    <td style="background-color:black; color:white;">
                        HTML
                    </td>
                </tr>
            </table>

        </td>

        <td>

            <table border="1" width="100%">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>Data 1</td>
                    <td>Data 2</td>
                </tr>
            </table>

        </td>
    </tr>

    <tr>
        <td>

            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 3</th>
                </tr>
                <tr>
                    <td>
                        <ul>
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul>
                    </td>
                </tr>
            </table>

        </td>

        <td>

            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td>Sample Text</td>
                </tr>
            </table>

        </td>
    </tr>

</table>

   
  </body>
</html>
